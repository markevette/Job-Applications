name: Daily job scraping and resume tailoring

on:
  schedule:
    # 05:00 UTC ≈ 07:00 Berlin (CEST)
    - cron: "0 5 * * *"
  workflow_dispatch:
    # enables the Run workflow button

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest

    env:
      APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      BASE_RESUME_PATH: "data/base_resume.txt"
      TARGET_ROLES: "Data Analyst,Machine Learning Engineer,MLOps Engineer"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch jobs from Apify
        run: |
          python scripts/fetch_jobs.py --output data/jobs_raw.json

      - name: Filter jobs
        run: |
          python scripts/filter_jobs.py \
            --input data/jobs_raw.json \
            --output data/jobs_filtered.json \
            --roles "${TARGET_ROLES}"

      - name: Extract keywords and tailor resumes
        run: |
          python scripts/extract_keywords.py --input data/jobs_filtered.json
          python scripts/rewrite_resume.py \
            --jobs data/jobs_filtered.json \
            --base "${BASE_RESUME_PATH}"

      - name: Create Google Docs
        run: |
          python scripts/create_google_doc.py --jobs data/jobs_filtered.json

      - name: Send summary email
        run: |
          python scripts/send_email.py --jobs data/jobs_filtered.json
